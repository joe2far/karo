<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- K symbol -->
  <g transform="translate(20, 12)">
    <!-- K vertical stroke -->
    <rect x="0" y="0" width="14" height="96" rx="4" fill="url(#grad)" />
    <!-- K upper diagonal -->
    <polygon points="14,48 14,36 60,0 72,0 72,14" fill="url(#grad)" />
    <!-- K lower diagonal -->
    <polygon points="14,48 14,60 60,96 72,96 72,82" fill="url(#grad)" />
  </g>

  <!-- Arrow -->
  <g transform="translate(105, 38)">
    <rect x="0" y="14" width="52" height="12" rx="4" fill="url(#arrow)" />
    <polygon points="48,0 48,40 76,20" fill="url(#arrow)" />
  </g>

  <!-- "karo" text -->
  <text x="200" y="88" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace" font-size="78" font-weight="700" letter-spacing="-2" fill="url(#grad)">karo</text>

  <!-- Tagline -->
  <text x="202" y="112" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="3.5" fill="#94a3b8">KUBERNETES AGENT RUNTIME ORCHESTRATOR</text>
</svg>
