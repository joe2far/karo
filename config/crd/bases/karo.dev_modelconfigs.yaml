---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.15.0
  name: modelconfigs.karo.dev
spec:
  group: karo.dev
  names:
    kind: ModelConfig
    listKind: ModelConfigList
    plural: modelconfigs
    singular: modelconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.provider
      name: Provider
      type: string
    - jsonPath: .spec.name
      name: Model
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              apiKeySecret:
                description: SecretKeySelector selects a key of a Secret.
                properties:
                  key:
                    description: The key of the secret to select from.  Must be a
                      valid secret key.
                    type: string
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      TODO: Add other useful fields. apiVersion, kind, uid?
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      TODO: Drop `kubebuilder:default` when controller-gen doesn't need it https://github.com/kubernetes-sigs/kubebuilder/issues/3896.
                    type: string
                  optional:
                    description: Specify whether the Secret or its key must be defined
                    type: boolean
                required:
                - key
                type: object
                x-kubernetes-map-type: atomic
              bedrock:
                properties:
                  endpointOverride:
                    type: string
                  irsaRoleArn:
                    minLength: 1
                    type: string
                  region:
                    minLength: 1
                    type: string
                required:
                - irsaRoleArn
                - region
                type: object
              endpoint:
                type: string
              gatewayRef:
                description: |-
                  GatewayRef points at a native Gateway API resource
                  (gateway.networking.k8s.io/v1 Gateway) running the agentgateway.dev
                  data plane. When set, the ModelConfig controller renders an
                  `AgentgatewayBackend` (agentgateway.dev/v1alpha1) plus an `HTTPRoute`
                  attaching this ModelConfig's provider config to that Gateway. Agents
                  consuming this ModelConfig dial the gateway endpoint (published in
                  status.resolvedEndpoint) instead of the provider directly.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      TODO: Add other useful fields. apiVersion, kind, uid?
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                      TODO: Drop `kubebuilder:default` when controller-gen doesn't need it https://github.com/kubernetes-sigs/kubebuilder/issues/3896.
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              name:
                minLength: 1
                type: string
              parameters:
                properties:
                  maxTokens:
                    format: int32
                    minimum: 1
                    type: integer
                  temperature:
                    type: number
                  topP:
                    type: number
                type: object
              provider:
                minLength: 1
                type: string
              rateLimit:
                properties:
                  requestsPerMinute:
                    format: int32
                    minimum: 0
                    type: integer
                  tokensPerDay:
                    format: int64
                    minimum: 0
                    type: integer
                  tokensPerMinute:
                    format: int64
                    minimum: 0
                    type: integer
                type: object
              vertex:
                properties:
                  endpointOverride:
                    type: string
                  gcpServiceAccount:
                    type: string
                  location:
                    minLength: 1
                    type: string
                  project:
                    minLength: 1
                    type: string
                required:
                - gcpServiceAccount
                - location
                - project
                type: object
            required:
            - name
            - provider
            type: object
            x-kubernetes-validations:
            - message: 'provider must be one of: anthropic, openai, bedrock, vertex'
              rule: self.provider in ['anthropic','openai','bedrock','vertex']
            - message: bedrock config is required when provider is bedrock
              rule: self.provider != 'bedrock' || has(self.bedrock)
            - message: vertex config is required when provider is vertex
              rule: self.provider != 'vertex' || has(self.vertex)
            - message: apiKeySecret is required for anthropic and openai providers
              rule: self.provider in ['bedrock','vertex'] || has(self.apiKeySecret)
          status:
            properties:
              conditions:
                items:
                  description: "Condition contains details for one aspect of the current
                    state of this API Resource.\n---\nThis struct is intended for
                    direct use as an array at the field path .status.conditions.  For
                    example,\n\n\n\ttype FooStatus struct{\n\t    // Represents the
                    observations of a foo's current state.\n\t    // Known .status.conditions.type
                    are: \"Available\", \"Progressing\", and \"Degraded\"\n\t    //
                    +patchMergeKey=type\n\t    // +patchStrategy=merge\n\t    // +listType=map\n\t
                    \   // +listMapKey=type\n\t    Conditions []metav1.Condition `json:\"conditions,omitempty\"
                    patchStrategy:\"merge\" patchMergeKey:\"type\" protobuf:\"bytes,1,rep,name=conditions\"`\n\n\n\t
                    \   // other fields\n\t}"
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        ---
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be
                        useful (see .node.status.conditions), the ability to deconflict is important.
                        The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastValidatedAt:
                format: date-time
                type: string
              phase:
                type: string
              provider:
                type: string
              resolvedEndpoint:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
