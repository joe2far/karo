apiVersion: karo.dev/v1alpha1
kind: ModelConfig
metadata:
  name: gemma4-31b-vllm
  namespace: karo-agents
spec:
  # vLLM exposes an OpenAI-compatible API, so use the openai provider
  provider: openai
  name: google/gemma-4-31b-it

  # For in-cluster vLLM the key can be a placeholder; vLLM does not enforce auth by default
  apiKeySecret:
    name: vllm-credentials
    key: API_KEY
  endpoint: "http://vllm-gemma4.karo-models.svc.cluster.local:8000/v1"

  parameters:
    maxTokens: 8192
    temperature: 0.3
    topP: 0.95

  rateLimit:
    requestsPerMinute: 120
    tokensPerMinute: 200000
    tokensPerDay: 5000000
