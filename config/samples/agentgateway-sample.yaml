apiVersion: karo.dev/v1alpha1
kind: AgentGateway
metadata:
  name: alpha-agent-gateway
  namespace: team-alpha
spec:
  # Defaults to the bundled agentgateway.dev build; override for pinned digests.
  image: ghcr.io/agentgateway/agentgateway:latest
  replicas: 2
  listenPort: 8080

  # Upstreams the gateway proxies to. Each ModelConfig / ToolSet reference is
  # resolved by the controller into concrete provider credentials and endpoints.
  upstreams:
    models:
      - name: primary
        modelConfigRef:
          name: claude-sonnet-direct
        weight: 80
        # On provider error or budget exceed, fall back to these ModelConfigs
        # (in order). Requires policy.failoverEnabled.
        fallbackOrder:
          - gemma4-vertex
      - name: fallback
        modelConfigRef:
          name: gemma4-vertex
        weight: 20

    tools:
      - name: engineering-tools
        toolSetRef:
          name: alpha-permitted-tools
        # Subset the tools exposed through this gateway. Empty = all tools.
        allowedTools:
          - github
          - web-search

    # Peer-agent upstreams (A2A). v1alpha1 plumbs configuration only; active
    # routing is gated on the A2A roadmap item.
    agents: []

  # Request-level governance. Enforced inside the gateway, not the operator.
  policy:
    rateLimit:
      requestsPerMinute: 600
      tokensPerMinute: 2000000
      perAgent: true
    budget:
      dailyUsd: 250.0
      monthlyUsd: 6000.0
      onExceed: fallback          # block | warn | fallback
    auth:
      mode: bearer
      bearerSecret:
        name: karo-agentgateway-auth
        key: token
    failoverEnabled: true

  observability:
    metricsEnabled: true
    metricsPort: 9090
    tracingEnabled: true
    tracingEndpoint: https://tempo.observability.svc:4318

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
---
# Pin a ModelConfig to route through the gateway. The AgentSpec does not need
# to change — agents consuming this ModelConfig will dial the gateway instead
# of Anthropic directly.
apiVersion: karo.dev/v1alpha1
kind: ModelConfig
metadata:
  name: claude-via-gateway
  namespace: team-alpha
spec:
  provider: anthropic
  name: claude-sonnet-4-20250514
  apiKeySecret:
    name: anthropic-credentials
    key: ANTHROPIC_API_KEY
  gatewayRef:
    name: alpha-agent-gateway
