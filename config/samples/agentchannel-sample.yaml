apiVersion: karo.dev/v1alpha1
kind: AgentChannel
metadata:
  name: alpha-slack-channel
  namespace: team-alpha
spec:
  # Platform binding -- one platform per AgentChannel resource
  platform:
    type: slack
    slack:
      appCredentialSecret:
        name: karo-slack-app
        key: SLACK_BOT_TOKEN
      signingSecret:
        name: karo-slack-app
        key: SLACK_SIGNING_SECRET
      appToken:
        name: karo-slack-app
        key: SLACK_APP_TOKEN
      # Primary Slack channel — outbound notifications without an explicit
      # thread context are posted here.
      channelId: "C04ABCDEF12"
      # Additional channels the bot is allowed to read from and respond in.
      # Inbound messages from any channel outside this list (plus channelId)
      # are silently ignored — the bot stays scoped to the team's channels.
      channelIds:
        - "C05PLATFORM01"   # #platform-announcements
        - "C06ALPHATEAM"    # #alpha-team
      socketMode: true
      # Only respond to these specific Slack users. Anyone else can chat
      # freely in the channel — the bot just ignores them.
      allowedUserIds:
        - "U01ALICE"
        - "U02BOB"
      # Bot only acts on messages that @-mention it (or that are DMs sent
      # by an allowed user, when allowDirectMessages is true). Prevents
      # the bot from reacting to ambient channel chatter.
      requireMention: true
      allowDirectMessages: true
      ignoreBots: true
      threadReplies: true

  # Inbound: what happens when a human sends a message
  inbound:
    defaultTeamRef:
      name: alpha-team
    mode: task-creation              # task-creation | human-override | auto
    taskGraphTemplate:
      ownerAgentRef:
        name: planner-agent
      dispatcherRef:
        name: alpha-router
      initialTaskType: design

  # Outbound: when KARO posts to the channel
  outbound:
    notifyOn:
      - taskGraphCreated
      - taskGraphCompleted
      - taskFailed
      - approvalRequired
      - evalGateFailed
    format: summary                  # summary | detailed | minimal
    summaryModelConfigRef:
      name: claude-sonnet-direct

  # Approval flow
  approvals:
    enabled: true
    style: interactive               # interactive | reply
    timeoutMinutes: 1440             # 24 hours
    onTimeout: escalate              # auto-approve | escalate | block

  # Multi-team handoff
  teamHandoff:
    - fromTeamRef:
        name: design-team
      toTeamRef:
        name: dev-team
      trigger: taskGraphCompleted
      requireApproval: true
      handoffTaskGraphTemplate:
        ownerAgentRef:
          name: dev-planner-agent
        dispatcherRef:
          name: dev-router
        initialTaskType: impl
        injectUpstreamContext: true
    - fromTeamRef:
        name: dev-team
      toTeamRef:
        name: qa-team
      trigger: taskGraphCompleted
      requireApproval: false
