---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-api-key
  namespace: team-builder
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "<your-anthropic-api-key>"
---
# GitHub credentials for reading repos and issues
apiVersion: v1
kind: Secret
metadata:
  name: github-mcp-credentials
  namespace: team-builder
type: Opaque
stringData:
  GITHUB_TOKEN: "<your-github-token>"
---
# Jira credentials for reading project history
apiVersion: v1
kind: Secret
metadata:
  name: jira-mcp-credentials
  namespace: team-builder
type: Opaque
stringData:
  JIRA_URL: "<your-jira-instance-url>"
  JIRA_TOKEN: "<your-jira-api-token>"
  JIRA_EMAIL: "<your-jira-email>"
---
# mem0 API key for team knowledge
apiVersion: v1
kind: Secret
metadata:
  name: mem0-api-key
  namespace: team-builder
type: Opaque
stringData:
  API_KEY: "<your-mem0-api-key>"
---
# Slack credentials for notifications
apiVersion: v1
kind: Secret
metadata:
  name: slack-app-credentials
  namespace: team-builder
type: Opaque
stringData:
  BOT_TOKEN: "<your-slack-bot-token>"
---
apiVersion: v1
kind: Secret
metadata:
  name: slack-signing-secret
  namespace: team-builder
type: Opaque
stringData:
  SIGNING_SECRET: "<your-slack-signing-secret>"
