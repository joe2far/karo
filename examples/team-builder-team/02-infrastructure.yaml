---
# ModelConfig: Claude Sonnet for team design tasks
apiVersion: karo.dev/v1alpha1
kind: ModelConfig
metadata:
  name: claude-sonnet
  namespace: team-builder
spec:
  provider: anthropic
  name: claude-sonnet-4-20250514
  apiKeySecret:
    name: anthropic-api-key
    key: ANTHROPIC_API_KEY
  parameters:
    maxTokens: 8192
    temperature: 0.3         # Balanced creativity for team design
---
# ModelConfig: Claude Opus for complex analysis
apiVersion: karo.dev/v1alpha1
kind: ModelConfig
metadata:
  name: claude-opus
  namespace: team-builder
spec:
  provider: anthropic
  name: claude-opus-4-20250514
  apiKeySecret:
    name: anthropic-api-key
    key: ANTHROPIC_API_KEY
  parameters:
    maxTokens: 16384
    temperature: 0.2
---
# SandboxClass: network access for GitHub/Jira APIs
apiVersion: karo.dev/v1alpha1
kind: SandboxClass
metadata:
  name: team-builder-sandbox
  namespace: team-builder
spec:
  runtimeClassName: gvisor
  networkPolicy:
    egress: restricted
    allowedDomains:
      - "api.github.com"
      - "*.atlassian.net"
      - "*.jira.com"
    allowedCIDRs:
      - "10.0.0.0/8"
  filesystem:
    readOnlyRootFilesystem: false
    allowedMounts:
      - /tmp
      - /workspace
  resourceLimits:
    cpu: "2"
    memory: "4Gi"
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL
---
# MemoryStore: team patterns and historical knowledge
apiVersion: karo.dev/v1alpha1
kind: MemoryStore
metadata:
  name: team-builder-memory
  namespace: team-builder
spec:
  backend:
    type: mem0
    mem0:
      apiKeySecret:
        name: mem0-api-key
        key: API_KEY
      organizationId: "platform-org"
      projectId: "team-builder"
  scope: team
  retentionDays: 365
  maxMemories: 20000
  categories:
    - team-patterns
    - agent-capabilities
    - issue-analysis
    - team-specs
    - retrospective
---
# ToolSet: tools for researching teams and issues
apiVersion: karo.dev/v1alpha1
kind: ToolSet
metadata:
  name: team-builder-tools
  namespace: team-builder
spec:
  tools:
    - name: github
      type: mcp
      transport: streamable-http
      endpoint: "http://github-mcp-server.team-builder.svc:8080"
      permissions:
        - read
        - list
        - search
      credentialSecret:
        name: github-mcp-credentials
        key: GITHUB_TOKEN

    - name: jira
      type: mcp
      transport: streamable-http
      endpoint: "http://jira-mcp-server.team-builder.svc:8080"
      permissions:
        - read
        - search
      credentialSecret:
        name: jira-mcp-credentials
        key: JIRA_TOKEN

    - name: code-executor
      type: mcp
      transport: stdio
      command: ["/usr/local/bin/code-exec-mcp"]
      permissions:
        - execute
      sandboxRequired: true

  policyRef:
    name: team-builder-policy
---
# AgentPolicy: governance for team builder
apiVersion: karo.dev/v1alpha1
kind: AgentPolicy
metadata:
  name: team-builder-policy
  namespace: team-builder
spec:
  targetSelector:
    matchLabels:
      team: team-builder

  models:
    allowedProviders:
      - anthropic
    requireMinContextWindow: 100000

  toolCalls:
    maxPerMinute: 60
    maxPerLoop: 500
    requireSandboxForExecute: true

  loop:
    maxIterationsPerRun: 100
    maxRunDurationMinutes: 120
    requireHumanApprovalAfterIterations: 50

  taskGraph:
    allowMutation: true
    mutationScope:
      - addTask
      - closeTask
    denyMutation:
      - deleteTask
    requireAuditTrail: true

  audit:
    enabled: true
    logLevel: Full
    logDestination:
      type: stdout
    retentionDays: 365

  dataClassification:
    allowedLevels:
      - internal
      - confidential
    denyPatterns:
      - ".*password.*"
      - ".*secret.*"
      - ".*private.?key.*"

  escalation:
    onPolicyViolation: Block
---
# EvalSuite: quality gates for team spec generation
apiVersion: karo.dev/v1alpha1
kind: EvalSuite
metadata:
  name: team-builder-evals
  namespace: team-builder
spec:
  agentSpecRef:
    name: spec-generator
  evalCases:
    - id: valid-team-spec
      description: "Generated AgentTeam spec is valid YAML with all required fields"
      assertions:
        - type: llm-judge
          criteria: "The output contains a valid AgentTeam YAML spec with agents, sharedResources, dispatcherRef, and at least one orchestrator role"
          judgeModelConfigRef:
            name: claude-sonnet
    - id: roles-appropriate
      description: "Agent roles match the team's purpose and workload"
      assertions:
        - type: llm-judge
          criteria: "Each agent has a clear role (orchestrator/executor/evaluator/reviewer) that aligns with the team's described purpose, and the team has appropriate coverage of needed capabilities"
          judgeModelConfigRef:
            name: claude-sonnet
    - id: capabilities-complete
      description: "All required capabilities are covered by at least one agent"
      assertions:
        - type: llm-judge
          criteria: "The team spec covers all capabilities needed for the described workflow, with no gaps in task routing"
          judgeModelConfigRef:
            name: claude-sonnet
