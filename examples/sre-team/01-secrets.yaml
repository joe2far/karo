---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-api-key
  namespace: sre-team
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "<your-anthropic-api-key>"
---
# Prometheus/Grafana MCP server credentials
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-mcp-credentials
  namespace: sre-team
type: Opaque
stringData:
  PROMETHEUS_URL: "http://prometheus.monitoring.svc:9090"
  GRAFANA_TOKEN: "<your-grafana-api-token>"
---
# Kubernetes API access for the diagnostics agent
apiVersion: v1
kind: Secret
metadata:
  name: k8s-mcp-credentials
  namespace: sre-team
type: Opaque
stringData:
  KUBECONFIG: "<base64-kubeconfig-or-use-in-cluster>"
---
# Loki/log aggregation credentials
apiVersion: v1
kind: Secret
metadata:
  name: loki-mcp-credentials
  namespace: sre-team
type: Opaque
stringData:
  LOKI_URL: "http://loki.monitoring.svc:3100"
---
# mem0 API key
apiVersion: v1
kind: Secret
metadata:
  name: mem0-api-key
  namespace: sre-team
type: Opaque
stringData:
  API_KEY: "<your-mem0-api-key>"
---
# Slack credentials
apiVersion: v1
kind: Secret
metadata:
  name: slack-app-credentials
  namespace: sre-team
type: Opaque
stringData:
  BOT_TOKEN: "<your-slack-bot-token>"
---
apiVersion: v1
kind: Secret
metadata:
  name: slack-signing-secret
  namespace: sre-team
type: Opaque
stringData:
  SIGNING_SECRET: "<your-slack-signing-secret>"
---
# GitHub credentials for infra repos
apiVersion: v1
kind: Secret
metadata:
  name: github-mcp-credentials
  namespace: sre-team
type: Opaque
stringData:
  GITHUB_TOKEN: "<your-github-token>"
---
apiVersion: v1
kind: Secret
metadata:
  name: remediation-git-token
  namespace: sre-team
type: Opaque
stringData:
  GITHUB_TOKEN: "<your-github-token>"
