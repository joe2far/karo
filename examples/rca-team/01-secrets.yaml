---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-api-key
  namespace: rca-team
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "<your-anthropic-api-key>"
---
# Slack credentials for reading channel history
apiVersion: v1
kind: Secret
metadata:
  name: slack-app-credentials
  namespace: rca-team
type: Opaque
stringData:
  BOT_TOKEN: "<your-slack-bot-token>"
---
apiVersion: v1
kind: Secret
metadata:
  name: slack-signing-secret
  namespace: rca-team
type: Opaque
stringData:
  SIGNING_SECRET: "<your-slack-signing-secret>"
---
# Google Workspace credentials for Google Docs
apiVersion: v1
kind: Secret
metadata:
  name: google-workspace-credentials
  namespace: rca-team
type: Opaque
stringData:
  SERVICE_ACCOUNT_KEY: "<base64-encoded-service-account-json>"
  DRIVE_FOLDER_ID: "<google-drive-folder-id-for-rcas>"
---
# Jira credentials for creating follow-up tickets
apiVersion: v1
kind: Secret
metadata:
  name: jira-mcp-credentials
  namespace: rca-team
type: Opaque
stringData:
  JIRA_URL: "<your-jira-instance-url>"
  JIRA_TOKEN: "<your-jira-api-token>"
  JIRA_EMAIL: "<your-jira-email>"
---
# mem0 API key for RCA knowledge base
apiVersion: v1
kind: Secret
metadata:
  name: mem0-api-key
  namespace: rca-team
type: Opaque
stringData:
  API_KEY: "<your-mem0-api-key>"
---
# PagerDuty credentials for incident timeline
apiVersion: v1
kind: Secret
metadata:
  name: pagerduty-mcp-credentials
  namespace: rca-team
type: Opaque
stringData:
  API_TOKEN: "<your-pagerduty-api-token>"
