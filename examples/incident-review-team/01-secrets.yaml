---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-api-key
  namespace: incident-review
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "<your-anthropic-api-key>"
---
# Jira credentials for reading and updating issues
apiVersion: v1
kind: Secret
metadata:
  name: jira-mcp-credentials
  namespace: incident-review
type: Opaque
stringData:
  JIRA_URL: "<your-jira-instance-url>"
  JIRA_TOKEN: "<your-jira-api-token>"
  JIRA_EMAIL: "<your-jira-email>"
---
# mem0 API key for incident memory
apiVersion: v1
kind: Secret
metadata:
  name: mem0-api-key
  namespace: incident-review
type: Opaque
stringData:
  API_KEY: "<your-mem0-api-key>"
---
# Slack credentials for weekly report delivery
apiVersion: v1
kind: Secret
metadata:
  name: slack-app-credentials
  namespace: incident-review
type: Opaque
stringData:
  BOT_TOKEN: "<your-slack-bot-token>"
---
apiVersion: v1
kind: Secret
metadata:
  name: slack-signing-secret
  namespace: incident-review
type: Opaque
stringData:
  SIGNING_SECRET: "<your-slack-signing-secret>"
---
# Confluence/wiki credentials for publishing reports
apiVersion: v1
kind: Secret
metadata:
  name: confluence-mcp-credentials
  namespace: incident-review
type: Opaque
stringData:
  CONFLUENCE_URL: "<your-confluence-url>"
  CONFLUENCE_TOKEN: "<your-confluence-api-token>"
  CONFLUENCE_EMAIL: "<your-confluence-email>"
