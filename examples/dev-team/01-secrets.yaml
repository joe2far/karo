---
# Anthropic API key for Claude models
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-api-key
  namespace: dev-team
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "<your-anthropic-api-key>"
---
# GitHub MCP server credentials
apiVersion: v1
kind: Secret
metadata:
  name: github-mcp-credentials
  namespace: dev-team
type: Opaque
stringData:
  GITHUB_TOKEN: "<your-github-token>"
---
# Git push token for coder agent
apiVersion: v1
kind: Secret
metadata:
  name: coder-git-token
  namespace: dev-team
type: Opaque
stringData:
  GITHUB_TOKEN: "<your-github-token>"
---
# mem0 API key for shared memory
apiVersion: v1
kind: Secret
metadata:
  name: mem0-api-key
  namespace: dev-team
type: Opaque
stringData:
  API_KEY: "<your-mem0-api-key>"
---
# Slack credentials for AgentChannel
apiVersion: v1
kind: Secret
metadata:
  name: slack-app-credentials
  namespace: dev-team
type: Opaque
stringData:
  BOT_TOKEN: "<your-slack-bot-token>"
---
apiVersion: v1
kind: Secret
metadata:
  name: slack-signing-secret
  namespace: dev-team
type: Opaque
stringData:
  SIGNING_SECRET: "<your-slack-signing-secret>"
