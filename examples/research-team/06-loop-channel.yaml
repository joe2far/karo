---
# AgentLoop: weekly research digest
apiVersion: karo.dev/v1alpha1
kind: AgentLoop
metadata:
  name: weekly-digest
  namespace: research-team
spec:
  agentSpecRef:
    name: research-lead

  triggers:
    - type: cron
      schedule: "0 9 * * 1"   # Monday 9am

  dispatcherRef:
    name: research-router

  contextCarryover: true
---
# AgentChannel: Slack for research reviews
apiVersion: karo.dev/v1alpha1
kind: AgentChannel
metadata:
  name: research-slack
  namespace: research-team
spec:
  platform:
    type: slack
    slack:
      appCredentialSecret:
        name: slack-app-credentials
      signingSecret:
        name: slack-signing-secret
      defaultChannel: "#research-team"

  teamRef:
    name: research-team

  approvalConfig:
    requiredApprovers: 1
    timeoutMinutes: 2880          # 48h for research reviews
    reminderIntervalMinutes: 480  # remind every 8h
