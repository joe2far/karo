---
# Per-team JQL queries. Each team has its own ConfigMap so ownership is clear
# and queries can be edited without touching other teams' configuration. The
# refinement-templates MCP server reads these and exposes them via jql.read.
apiVersion: v1
kind: ConfigMap
metadata:
  name: team-a-jql
  namespace: backlog-review-team
  labels:
    team: backlog-review
    subject-team: team-a
data:
  team.yaml: |
    teamKey: team-a
    displayName: "Team A (Platform)"
    slackChannelId: "C0TEAM-A-BACKLOG"
    # Only pull tickets sitting in Team A's backlog. Excludes anything already
    # in progress, done, or owned by another team.
    jqlQueries:
      backlog: >
        project = "PLAT"
        AND issuetype in (Story, Epic, Task, Bug)
        AND status in ("Backlog", "Open", "To Do")
        AND "Team[Dropdown]" = "Team A"
        AND resolution = Unresolved
        ORDER BY Rank ASC
      refinementReady: >
        project = "PLAT"
        AND "Team[Dropdown]" = "Team A"
        AND status = "Refinement"
        ORDER BY updated DESC
      epicsInFlight: >
        project = "PLAT"
        AND issuetype = Epic
        AND "Team[Dropdown]" = "Team A"
        AND status in ("In Progress", "Refinement")
---
apiVersion: v1
kind: ConfigMap
metadata:
