---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-api-key
  namespace: backlog-review-team
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "<your-anthropic-api-key>"
---
# Jira API credentials used by the Jira MCP server.
# Create a Jira API token at https://id.atlassian.com/manage-profile/security/api-tokens
apiVersion: v1
kind: Secret
metadata:
  name: jira-mcp-credentials
  namespace: backlog-review-team
type: Opaque
stringData:
  JIRA_URL: "https://<your-org>.atlassian.net"
  JIRA_EMAIL: "<your-service-account-email>"
  JIRA_API_TOKEN: "<your-jira-api-token>"
---
# Slack credentials for the Slack MCP server that the agents use
# to post update messages into per-team channels.
apiVersion: v1
kind: Secret
metadata:
  name: slack-mcp-credentials
  namespace: backlog-review-team
type: Opaque
stringData:
  SLACK_BOT_TOKEN: "<your-slack-bot-token>"
---
# Slack credentials for the AgentChannel (human-in-the-loop approvals and
# inbound triggers). These are typically the same app as slack-mcp-credentials.
apiVersion: v1
kind: Secret
metadata:
  name: slack-app-credentials
  namespace: backlog-review-team
type: Opaque
stringData:
  BOT_TOKEN: "<your-slack-bot-token>"
---
apiVersion: v1
kind: Secret
metadata:
  name: slack-signing-secret
  namespace: backlog-review-team
type: Opaque
stringData:
  SIGNING_SECRET: "<your-slack-signing-secret>"
---
apiVersion: v1
kind: Secret
metadata:
  name: mem0-api-key
  namespace: backlog-review-team
type: Opaque
stringData:
  API_KEY: "<your-mem0-api-key>"
