      Slack channel: C0TEAM-C-BACKLOG
      Top-N tickets to score: 12
      Review cadence: weekly, Wednesday 08:00 UTC
      Memory category: team-c-backlog-snapshot

      Run the weekly backlog review for team-c ONLY. Do not query other
