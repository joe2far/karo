    name: backlog-lead

  triggers:
    - type: cron
      schedule: "0 8 * * 2"    # Tuesdays 08:00 UTC

  dispatcherRef:
    name: backlog-router

  contextCarryover: true

  concurrencyPolicy: Forbid

  loopPrompt:
    inline: |
      Subject team: team-b
      Display name: Team B (Payments)
      JQL source: ConfigMap team-b-jql (key: team.yaml)
      Slack channel: C0TEAM-B-BACKLOG
      Top-N tickets to score: 20         # Payments carries a bigger backlog
      Review cadence: weekly, Tuesday 08:00 UTC
      Memory category: team-b-backlog-snapshot

      Run the weekly backlog review for team-b ONLY. Do not query other
      teams' projects or labels. Post the final summary to the Slack
      channel above. Store this week's snapshot in the named memory
      category.

  evalGate:
    evalSuiteRef:
      name: backlog-evals
    minPassRate: 0.80
---
# Team C: Wednesday 08:00 UTC.
apiVersion: karo.dev/v1alpha1
