---
# ----------------------------------------------------------------------------
# Per-team AgentChannels. Each AgentChannel points at a different Slack
# channel. They are used for (a) outbound weekly summaries posted by the
# backlog-lead via the slack MCP AND (b) inbound human requests
# ("/backlog-review trigger team-a now") that can kick off an off-cycle run.
# ----------------------------------------------------------------------------

apiVersion: karo.dev/v1alpha1
kind: AgentChannel
metadata:
  name: team-a-slack
  namespace: backlog-review-team
  labels:
    team: backlog-review
    subject-team: team-a
spec:
  platform:
    type: slack
    slack:
      appCredentialSecret:
        name: slack-app-credentials
        key: BOT_TOKEN
      signingSecret:
        name: slack-signing-secret
        key: SIGNING_SECRET
      channelId: "C0TEAM-A-BACKLOG"
      threadReplies: true

  inbound:
    defaultTeamRef:
      name: backlog-review-team
    mode: task-creation
    taskGraphTemplate:
      ownerAgentRef:
        name: backlog-lead
      dispatcherRef:
        name: backlog-router
      initialTaskType: design

  outbound:
    notifyOn:
      - taskGraphCompleted
      - taskFailed
      - approvalRequired
      - evalGateFailed
    format: summary

  approvals:
    enabled: true
    style: interactive
    timeoutMinutes: 1440        # 24h for backlog decisions
    onTimeout: Escalate
