---
# ----------------------------------------------------------------------------
# Per-team AgentLoops. One AgentLoop per subject team so each team has its own
# weekly heartbeat, schedule, and loop prompt. The loop prompt injects the
# team key, JQL ConfigMap, and Slack channel so the same Backlog Lead agent
# can run identical logic against different backlogs.
# ----------------------------------------------------------------------------

# Team A: Monday 08:00 UTC weekly heartbeat.
apiVersion: karo.dev/v1alpha1
kind: AgentLoop
metadata:
  name: weekly-review-team-a
  namespace: backlog-review-team
  labels:
    team: backlog-review
    subject-team: team-a
spec:
  agentSpecRef:
    name: backlog-lead

  triggers:
    - type: cron
      schedule: "0 8 * * 1"    # Mondays 08:00 UTC

  dispatcherRef:
    name: backlog-router

  contextCarryover: true       # Keep prior-week context (deltas, stuck items)

  concurrencyPolicy: Forbid    # Never overlap two runs for the same team

  loopPrompt:
    inline: |
      Subject team: team-a
      Display name: Team A (Platform)
      JQL source: ConfigMap team-a-jql (key: team.yaml)
      Slack channel: C0TEAM-A-BACKLOG
      Top-N tickets to score: 15
      Review cadence: weekly, Monday 08:00 UTC
      Memory category: team-a-backlog-snapshot

      Run the weekly backlog review for team-a ONLY. Do not query other
      teams' projects or labels. Post the final summary to the Slack
      channel above. Store this week's snapshot in the named memory
      category.

  evalGate:
    evalSuiteRef:
      name: backlog-evals
    minPassRate: 0.80
---
# Team B: Tuesday 08:00 UTC. Offset by a day so Slack notifications don't
# all land on the same morning.
apiVersion: karo.dev/v1alpha1
kind: AgentLoop
metadata:
  name: weekly-review-team-b
  namespace: backlog-review-team
