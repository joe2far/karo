---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-api-key
  namespace: security-team
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "<your-anthropic-api-key>"
---
# Jira credentials for reading Wiz findings and updating issues
apiVersion: v1
kind: Secret
metadata:
  name: jira-mcp-credentials
  namespace: security-team
type: Opaque
stringData:
  JIRA_URL: "<your-jira-instance-url>"
  JIRA_TOKEN: "<your-jira-api-token>"
  JIRA_EMAIL: "<your-jira-email>"
---
# GitHub credentials for creating PRs with dependency updates
apiVersion: v1
kind: Secret
metadata:
  name: github-mcp-credentials
  namespace: security-team
type: Opaque
stringData:
  GITHUB_TOKEN: "<your-github-token>"
---
apiVersion: v1
kind: Secret
metadata:
  name: remediation-git-token
  namespace: security-team
type: Opaque
stringData:
  GITHUB_TOKEN: "<your-github-token>"
---
# mem0 API key for security knowledge base
apiVersion: v1
kind: Secret
metadata:
  name: mem0-api-key
  namespace: security-team
type: Opaque
stringData:
  API_KEY: "<your-mem0-api-key>"
---
# Slack credentials for security notifications
apiVersion: v1
kind: Secret
metadata:
  name: slack-app-credentials
  namespace: security-team
type: Opaque
stringData:
  BOT_TOKEN: "<your-slack-bot-token>"
---
apiVersion: v1
kind: Secret
metadata:
  name: slack-signing-secret
  namespace: security-team
type: Opaque
stringData:
  SIGNING_SECRET: "<your-slack-signing-secret>"
---
# Wiz API credentials (optional, for enriching findings)
apiVersion: v1
kind: Secret
metadata:
  name: wiz-api-credentials
  namespace: security-team
type: Opaque
stringData:
  WIZ_CLIENT_ID: "<your-wiz-client-id>"
  WIZ_CLIENT_SECRET: "<your-wiz-client-secret>"
  WIZ_API_URL: "<your-wiz-api-endpoint>"
