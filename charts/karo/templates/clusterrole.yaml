{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "karo.fullname" . }}-manager
  labels:
    {{- include "karo.labels" . | nindent 4 }}
rules:
  # KARO CRDs - full access
  - apiGroups: ["karo.dev"]
    resources: ["*"]
    verbs: ["*"]

  # Core resources
  - apiGroups: [""]
    resources: ["pods", "pods/status", "configmaps", "secrets", "events", "serviceaccounts"]
    verbs: ["*"]

  # Batch resources
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["*"]

  # Network policies
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["*"]

  # Runtime classes (read-only)
  - apiGroups: ["node.k8s.io"]
    resources: ["runtimeclasses"]
    verbs: ["get", "list", "watch"]

  # Agent Gateway integration — the operator translates KARO ModelConfig
  # and ToolSet resources into native agentgateway.dev backends and
  # Gateway API HTTPRoutes that attach to the user's Gateway.
  - apiGroups: ["agentgateway.dev"]
    resources: ["agentgatewaybackends"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list", "watch"]

  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}
