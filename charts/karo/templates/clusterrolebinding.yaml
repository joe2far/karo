{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "karo.fullname" . }}-manager
  labels:
    {{- include "karo.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "karo.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "karo.serviceAccountName" . }}
    namespace: {{ include "karo.namespace" . }}
{{- end }}
