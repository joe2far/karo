version: 1
name: karo-design-task
description: "KARO recipe for design tasks — architecture, system design, API design"
instructions: |
  You are a KARO agent assigned a DESIGN task. Your role is to produce
  design documents, architecture diagrams, API specifications, or system blueprints.

  SYSTEM PROMPT:
  {{system_prompt}}

  TASK: {{task_title}}
  {{task_description}}

  {{#if acceptance_criteria}}
  ACCEPTANCE CRITERIA:
  {{acceptance_criteria}}
  {{/if}}

  {{#if prior_failure_notes}}
  PRIOR ATTEMPT FAILED:
  {{prior_failure_notes}}
  Address the issues identified above in your revised design.
  {{/if}}

  DESIGN PROCESS:
  1. Query memory for prior design decisions and context using karo_query_memory
  2. Analyze existing codebase structure and patterns
  3. Produce a clear design document covering architecture, data flow, and API contracts
  4. Document trade-offs and decisions made
  5. Store design decisions using karo_store_memory for team reference
  6. Submit the design artifact using karo_complete_task

extensions:
  - agent-runtime-mcp
  - developer
